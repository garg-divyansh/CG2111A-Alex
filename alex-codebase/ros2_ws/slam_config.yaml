slam_toolbox:
  ros__parameters:

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function_type: None

    odom_frame: base_link
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    minimum_time_interval: 0.0

    minimum_score: 0.0
    link_match_minimum_response_fine: 0.0

    # Tighter search window — prevents sudden jumps
    scan_matching_search_radius: 0.3
    scan_matching_search_angle_offset: 0.2

    map_update_interval: 0.5
    transform_timeout: 1.0
    tf_buffer_duration: 30.0

    resolution: 0.03          # finer cells = better wall distinction
    max_laser_range: 6.0

    # Loop closure — corrects drift when you revisit areas
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 5
    loop_match_minimum_response_coarse: 0.2
    loop_match_minimum_response_fine: 0.4

    stack_size_to_use: 40000000
    throttle_scans: 1